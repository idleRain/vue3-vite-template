<!doctype html>
<html lang="%VITE_APP_LOCALE%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no, email=no, address=no" />
    <meta name="description" content="%VITE_APP_TITLE%" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <title>%VITE_APP_TITLE%</title>
    <style>
      /* 首屏 loading：在 Vue 应用挂载前显示，挂载后被 #app 整体替换。*/
      /* 视觉与 src/components/loading/loading.vue 保持一致（修改时请同步）。 */
      .app-loading {
        display: flex;
        position: fixed;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        inset: 0;
        background: rgba(255, 255, 255, 0.6);
      }
      @media (prefers-color-scheme: dark) {
        .app-loading {
          background: rgba(37, 37, 37, 0.6);
        }
      }
      .app-loading__loader {
        display: grid;
        animation: app-loading-spin 1s infinite linear;
        border: 4px solid transparent;
        border-right-color: #25b09b;
        border-radius: 50%;
        aspect-ratio: 1;
        width: 50px;
        height: 50px;
      }
      .app-loading__loader::before,
      .app-loading__loader::after {
        grid-area: 1 / 1;
        animation: app-loading-spin 2s infinite;
        margin: 2px;
        border: inherit;
        border-radius: 50%;
        content: '';
      }
      .app-loading__loader::after {
        animation-duration: 3s;
        margin: 8px;
      }
      @keyframes app-loading-spin {
        100% {
          transform: rotate(1turn);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-loading">
        <div class="app-loading__loader" aria-label="loading"></div>
      </div>
    </div>
    <noscript>
      <div style="padding: 24px; text-align: center; font-family: sans-serif">
        当前浏览器未启用 JavaScript，本应用无法正常运行，请启用后刷新页面。
      </div>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
